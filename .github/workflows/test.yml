name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm install

      - name: Run MCP test suite (offline)
        run: npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile brain tooling
        run: python -m py_compile scripts/tools/metrics_engine.py scripts/tools/wiki_lint.py scripts/tools/plot_metrics.py scripts/tools/plot_accuracy.py
